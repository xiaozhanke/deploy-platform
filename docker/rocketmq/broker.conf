# deploy-platform 单机开发 broker 配置
# 仅适合单机开发,生产部署需要至少 2 个 NameServer + 主从 Broker

brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0

# brokerIP1 是 broker 注册到 NameServer 的地址,所有客户端(producer/consumer/dashboard)
# 都用它来直连 broker。这里填**主机名 rmqbroker**(compose 的 service 名)而非具体 IP,
# 让两类客户端各自解析到对自己可达的目标——这是 RocketMQ 官方对"IP 会变"场景的推荐做法:
#   - dashboard 等容器:docker 内置 DNS 把 rmqbroker 解析为 broker 的桥网络 IP,走 docker
#     桥直连 10911(**不经 vpnkit**,这正是 host.docker.internal 会坏掉的那一段)
#   - 宿主机 IDE 里的 deploy-server:靠宿主机 /etc/hosts 的 `127.0.0.1 rmqbroker`,经端口
#     映射 10911 直连 broker(走 loopback)
# 两条路都不碰 LAN IP、不碰 vpnkit,**Wi-Fi 切换网络后无需改任何东西**。
#
# 前置条件(本机一次性配好,已就绪):宿主机 /etc/hosts 有一行 `127.0.0.1 rmqbroker`。
# 改动本行后需 `docker restart deploy-platform-rmqbroker` 让 broker 用新地址重新注册。
#
# 历史踩坑(勿回退):
#   - 不要用 192.168.x.x 等 LAN IP:切网就变,producer 拿旧 IP 报 send message Exception(本次要根治的)
#   - 不要用 host.docker.internal:macOS vpnkit 转发 RocketMQ 协议字节会立刻关 channel
#     (broker.remoting.log 表现为 channelActive 后立刻 channelInactive),且 `nc -zv` 只测握手不发数据会误判连通
#   - 不要用 127.0.0.1:dashboard 容器视角下 127.0.0.1 是它自己,报 RemotingConnectException
# 生产部署:改成 broker 节点的真实 DNS 主机名(同样比裸 IP 更抗迁移)。
brokerIP1 = rmqbroker

# 自动创建 topic / consumerGroup,免去开发期 admin 命令
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true

# 顺序消息按 deploymentRecordId 分队列(见 ADR-0001),需要足够 queue 让不同部署记录分散
defaultTopicQueueNums = 8

# 异步刷盘,开发足够
flushDiskType = ASYNC_FLUSH

# broker 监听端口(对应 docker-compose 暴露的 10911)
listenPort = 10911

# 关闭未使用的 trace topic
traceTopicEnable = false
