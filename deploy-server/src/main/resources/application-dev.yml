logging:
  level:
    root: info
    web: debug
    sql: debug
    org.springframework.security: trace
    com.xiaozhanke.deploy: debug
  logback:
    rollingpolicy:
      max-history: 7
app:
  security:
    jwt:
      # 开发环境允许首次启动自动生成 JWT 密钥文件，方便本地调试
      auto-create-on-missing: true
    cors:
      # Vite 开发服务器默认地址；新增本地端口在此追加
      allowed-origins:
        - https://localhost:5173
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 本地默认指向 localhost:3306/deploy_tool；部署时通过 MYSQL_* 环境变量覆盖
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:deploy_tool}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true
  freemarker:
    template-loader-path: classpath:/templates/
# 数据库初始化
#  sql:
#    init:
#      mode: always
#      data-locations: classpath:/sql/data.sql
  security:
    oauth2:
      authorizationserver:
        client:
          oidc-client:
            registration:
              client-id: "oidc-client"
              client-authentication-methods:
                - "none"
              authorization-grant-types:
                - "authorization_code"
                - "refresh_token"
              redirect-uris:
                - "https://localhost:5173/ui/login/callback"
                # 让 Swagger UI(同进程,经 server.port=6060)走 OIDC 登录拿 token
                - "https://localhost:6060/swagger-ui/oauth2-redirect.html"
              post-logout-redirect-uris:
                - "https://localhost:5173/ui/login"
              scopes:
                - "openid"
                - "profile"
            require-authorization-consent: false
            require-proof-key: true
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: deploy-job-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
deploy-tool:
  mq:
    # 部署作业事务消息 Topic / Consumer Group(场景 1 + 场景 2)
    deploy-job-topic: deploy-job
    deploy-job-consumer-group: deploy-job-consumer
    # 顺序键按 deploymentRecordId 分队列(详见 ADR-0001),队列数与 broker.conf 的 defaultTopicQueueNums 对齐
    deploy-job-queue-count: 8
    # 自定义死信 Topic / Consumer Group(场景 5,ADR-0003)
    # 用业务名而非 RocketMQ 系统保留前缀 %DLQ%(后者默认只读,producer 手动投递会失败)
    dead-letter-topic: deploy-job-dlq
    dead-letter-consumer-group: deploy-job-dlq-consumer
    # 延迟作业 Topic / Consumer Group(场景 3,ADR-0004)
    # 延迟作业不走事务消息,作业直接 INSERT 入库后发延迟等级消息到此 Topic
    delayed-topic: deploy-job-delayed
    delayed-consumer-group: deploy-job-delayed-consumer
    # 配置广播 Topic / Consumer Group(场景 6:BROADCASTING 模式)
    # 每条配置变更送达所有实例——位移在消费者本地,而非 Broker(与 CLUSTERING 对比演示)
    config-broadcast-topic: config-broadcast
    config-broadcast-consumer-group: config-broadcast-consumer
  audit:
    # Kafka 审计日志配置(场景 4,ADR-0005)
    # 注意：不配置 spring.kafka.* —— KafkaConfig 手动构建 Producer/Consumer Factory,
    # 若配置 spring.kafka 会触发 KafkaAutoConfiguration 产生重复 Bean
    bootstrap-servers: 127.0.0.1:9092
    consumer-group: audit-log-consumer
    topic: audit-log
    # Topic 分区数 = Consumer Group 并发度(演示并发消费)
    partitions: 3
    # Kafka 同步发送超时(ms),超时转兜底文件
    send-timeout-millis: 3000
    # Kafka 不可用时的本地兜底文件,Kafka 恢复后由定时任务回放
    fallback-file: ./logs/audit-fallback.jsonl
    # 兜底文件回放间隔(ms),默认 60s
    replay-interval-millis: 60000