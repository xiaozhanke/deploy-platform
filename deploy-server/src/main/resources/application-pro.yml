logging:
  level:
    root: info
  logback:
    rollingpolicy:
      max-history: 30
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 生产环境必须通过 MYSQL_* 环境变量提供真实连接信息，默认值仅为本地兜底
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:deploy_tool}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  security:
    oauth2:
      authorizationserver:
        client:
          oidc-client:
            registration:
              client-id: "oidc-client"
              client-authentication-methods:
                - "none"
              authorization-grant-types:
                - "authorization_code"
                - "refresh_token"
              redirect-uris:
                # 生产环境必须使用绝对 URL，与 oidc-client-ts 发出的 redirect_uri 精确匹配
                - "${APP_BASE_URL:https://deploy.example.com}/ui/login/callback"
              post-logout-redirect-uris:
                # 必须指向落地路由 /ui/login/landing（与前端 .env.production 一致），
                # 不能是 /ui/login —— 后者会被 SPA 重定向进 /login/callback 造成回调死循环
                - "${APP_BASE_URL:https://deploy.example.com}/ui/login/landing"
              scopes:
                - "openid"
                - "profile"
            require-authorization-consent: false
            require-proof-key: true
            token:
              access-token-time-to-live: 10m
              refresh-token-time-to-live: 4h
              reuse-refresh-tokens: false